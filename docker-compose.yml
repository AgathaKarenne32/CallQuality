minio:
    image: minio/minio
    container_name: callquality_storage
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console/Painel
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  db_data:
  minio_data: